<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna District Police - PC/WPC Data Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-overlay" id="loginScreen">
        <div class="login-box">
            <h2 id="loginTitle">Login</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <div class="form-group" id="registerFields" style="display:none;">
                <label>Confirm Password</label>
                <input type="password" id="loginConfirmPassword" placeholder="Confirm password">
            </div>
            <button class="login-btn" id="loginBtn">Login</button>
            <div class="login-error" id="loginError"></div>
            <div class="register-link">
                <span id="authToggleText">Don't have an account?</span>
                <a id="authToggleLink">Register</a>
            </div>
        </div>
    </div>

    <!-- Main Header -->
    <header class="header" id="mainHeader">
        <h1>Krishna District Police <span class="badge" id="userRoleBadge">Admin</span></h1>
        <div class="header-actions" id="adminActions">
            <span class="user-email" id="userEmail"></span>
            <span class="record-count" id="dataCount">0 records</span>
            <button class="btn btn-primary" onclick="exportCSV()">Export</button>
            <button class="btn btn-danger" onclick="clearAllData()">Clear All</button>
            <button class="btn btn-secondary" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <div class="nav-buttons">
            <button class="nav-btn" onclick="showPage('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="showPage('personnel')">Personnel</button>
            <button class="nav-btn" onclick="showPage('deputation')">Deputation</button>
        </div>
        <div id="dashboard" class="page active">
            <h2>Dashboard</h2>
            <div class="district-tiles">
                <div class="district-tile" onclick="showKNRanks('CIVIL', this)">
                    <h3>Krishna New (CIVIL)</h3>
                    <div class="tile-count" id="krishnaNewCivilCount">0</div>
                </div>
                <div class="district-tile" onclick="showKNRanks('AR', this)">
                    <h3>Krishna New (AR)</h3>
                    <div class="tile-count" id="krishnaNewArCount">0</div>
                </div>
                <div class="district-tile" onclick="showDepUnitsPage()">
                    <h3>Deputation</h3>
                    <div class="tile-count" id="deputationCount">0</div>
                </div>
            </div>
        </div>
        <div id="personnel" class="page" style="display:none;">
            <h2>Personnel Management</h2>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Personnel</button>
            <div id="personnelModal" class="modal-overlay" style="display:none;">
                <div class="modal">
                    <div class="modal-header">
                        <h3 id="modalTitle">Add Personnel</h3>
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="personnelId">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Name *</label>
                                <input type="text" id="name" placeholder="Full name">
                            </div>
                            <div class="form-group">
                                <label>Genl.No *</label>
                                <input type="text" id="genlNo" placeholder="General number">
                            </div>
                            <div class="form-group">
                                <label>Type *</label>
                                <select id="personnelType" onchange="updateRankOptions()">
                                    <option value="CIVIL">CIVIL</option>
                                    <option value="AR">AR</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>District *</label>
                                <select id="district" onchange="updateRankOptions()">
                                    <option value="ERSTWHILE">ERSTWHILE</option>
                                    <option value="NEW">NEW</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Rank *</label>
                                <select id="rank"></select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select id="status">
                                    <option>Present</option>
                                    <option>Absent</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>On Deputation</label>
                                <select id="isOnDeputation" onchange="toggleDeploymentFields()">
                                    <option value="false">No</option>
                                    <option value="true">Yes</option>
                                </select>
                            </div>
                            <div class="form-group" id="presentWorkingGroup">
                                <label>Present Working</label>
                                <input type="text" id="presentWorking" placeholder="Current station">
                            </div>
                            <div class="form-group" id="deploymentUnitGroup" style="display:none;">
                                <label>Deployment Unit</label>
                                <select id="deploymentUnit">
                                    <option value="">Select Unit</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="phoneNumber" placeholder="Contact number">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button class="btn btn-primary" onclick="savePersonnel()">Save</button>
                    </div>
                </div>
            </div>
            <table id="personnelTable" style="display:none; margin-top:20px;">
                <thead>
                    <tr><th>Name</th><th>Rank</th><th>Type</th><th>District</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="personnelTableBody"></tbody>
            </table>
        </div>
        <div id="deputation" class="page" style="display:none;">
            <h2>Deputation Management</h2>
            <div class="dep-consolidated">
                <h3>Consolidated Report</h3>
                <table class="dep-consol-table">
                    <thead><tr><th>Rank</th><th>Sanctioned</th><th>Actual</th><th>Vacancies</th></tr></thead>
                    <tbody id="depConsolidatedBody"></tbody>
                </table>
            </div>
            <div class="sub-tiles dep-grid" id="depUnitTiles"></div>
            <div id="depUnitStrength" style="margin-top:20px;"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
    <script src="personnel.js"></script>
    <script src="deputation.js"></script>
    <script src="export.js"></script>
    <script src="app.js"></script>
</body>
</html>
